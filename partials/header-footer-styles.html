    <style>
      /* Header & Footer shared styles for tournament pages */
      header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        padding: 16px 0;
        background: rgba(0, 40, 78, 0.9);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(252, 175, 1, 0.1);
        transition: var(--transition-medium);
      }

      header.scrolled {
        padding: 12px 0;
        background: rgba(0, 40, 78, 0.98);
        border-bottom: 1px solid rgba(252, 175, 1, 0.2);
      }

      .header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: var(--container-max);
        margin: 0 auto;
        padding: 0 24px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        width: fit-content;
        min-width: 0;
        flex-shrink: 1;
      }

      .logo img {
        width: 48px;
        height: 48px;
        border-radius: var(--radius-sm);
        box-shadow: 0 0 20px rgba(252, 175, 1, 0.2);
        transition:
          box-shadow var(--transition-fast),
          transform var(--transition-fast);
      }

      .logo-text {
        font-family: var(--font-display);
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: -0.02em;
        position: relative;
        transition:
          color var(--transition-fast),
          text-shadow var(--transition-fast);
        background: linear-gradient(
          90deg,
          var(--text-primary) 0%,
          var(--text-primary) 40%,
          var(--accent-gold) 50%,
          var(--text-primary) 60%,
          var(--text-primary) 100%
        );
        background-size: 200% 100%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: logoShimmer 4s ease-in-out infinite;
        pointer-events: none;
      }

      @keyframes logoShimmer {
        0%,
        100% {
          background-position: 100% 0;
        }
        50% {
          background-position: 0% 0;
        }
      }

      .logo-text::after {
        content: "FightersTech";
        position: absolute;
        inset: 0;
        color: var(--accent-gold);
        background: none;
        -webkit-text-fill-color: var(--accent-gold);
        text-shadow: 0 0 20px rgba(252, 175, 1, 0.5);
        clip-path: inset(0 50% 0 50%);
        transition: clip-path 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        pointer-events: none;
      }

      @media (hover: hover) and (pointer: fine) {
        .logo:hover .logo-text {
          animation-play-state: paused;
        }
      }

      @media (hover: hover) and (pointer: fine) {
        .logo:hover .logo-text::after {
          clip-path: inset(0 0 0 0);
        }
      }

      .logo img {
        animation: logoGlowPulse 3s ease-in-out infinite;
      }

      @keyframes logoGlowPulse {
        0%,
        100% {
          box-shadow: 0 0 20px rgba(252, 175, 1, 0.2);
        }
        50% {
          box-shadow: 0 0 30px rgba(252, 175, 1, 0.45);
        }
      }

      @media (hover: hover) and (pointer: fine) {
        .logo:hover img {
          box-shadow: 0 0 40px rgba(252, 175, 1, 0.6);
          transform: scale(1.08);
        }
      }

      /* Language Toggle */
      .lang-toggle {
        display: flex;
        align-items: center;
        background: var(--bg-tertiary);
        border-radius: var(--radius-xl);
        padding: 4px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .lang-btn {
        padding: 8px 20px;
        border: none;
        background: transparent;
        color: var(--text-secondary);
        font-family: var(--font-display);
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        border-radius: var(--radius-xl);
        transition:
          color 0.25s ease,
          background 0.25s ease,
          box-shadow 0.25s ease,
          transform 0.25s ease;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        position: relative;
        overflow: hidden;
      }

      @media (hover: hover) and (pointer: fine) {
        .lang-btn:hover {
          background: var(--accent-gradient);
          color: #001a33;
          box-shadow: 0 4px 15px rgba(252, 175, 1, 0.3);
          transform: translateY(-1px);
        }
      }

      .lang-btn.active {
        background: var(--accent-gradient);
        color: #001a33;
        box-shadow: 0 4px 15px rgba(252, 175, 1, 0.3);
      }

      .lang-btn::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.25),
          transparent
        );
        transform: skewX(-20deg);
        transition: left 0.5s ease;
        z-index: 1;
      }

      @media (hover: hover) and (pointer: fine) {
        .lang-btn:hover::after {
          left: 150%;
        }
      }

      /* Mobile Menu Toggle */
      .mobile-menu-toggle {
        display: none;
        flex-direction: column;
        gap: 5px;
        padding: 8px;
        background: none;
        border: none;
        cursor: pointer;
        width: 40px;
        height: 40px;
        align-items: center;
        justify-content: center;
      }

      .mobile-menu-toggle span {
        display: block;
        width: 24px;
        height: 2px;
        background: var(--text-primary);
        transition:
          transform 250ms cubic-bezier(0.23, 1, 0.32, 1),
          opacity 200ms ease;
        transform-origin: center;
      }

      .mobile-menu-toggle:active {
        transform: scale(0.97);
      }

      .mobile-menu-toggle.active span:nth-child(1) {
        transform: translateY(7px) rotate(45deg);
      }

      .mobile-menu-toggle.active span:nth-child(2) {
        opacity: 0;
        transform: scaleX(0);
      }

      .mobile-menu-toggle.active span:nth-child(3) {
        transform: translateY(-7px) rotate(-45deg);
      }

      footer {
        background: var(--bg-secondary);
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        padding: 80px 0 40px;
      }

      .footer-grid {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr;
        gap: 48px;
        margin-bottom: 64px;
      }

      .footer-brand {
        max-width: 300px;
      }

      .footer-brand img {
        width: 64px;
        height: 64px;
        border-radius: var(--radius-md);
        margin-bottom: 20px;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      @media (hover: hover) and (pointer: fine) {
        .footer-brand img:hover {
          transform: scale(1.06);
          box-shadow: 0 0 30px rgba(252, 175, 1, 0.45);
        }
      }

      /* Quiet brand mark: static text, subtle gold hover */
      .footer-brand h3 {
        font-family: var(--font-display);
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 12px;
        width: fit-content;
        color: var(--text-primary);
        transition:
          color 0.3s ease,
          text-shadow 0.3s ease;
      }

      @media (hover: hover) and (pointer: fine) {
        .footer-brand h3:hover {
          color: var(--accent-gold);
          text-shadow: 0 0 16px rgba(252, 175, 1, 0.35);
        }
      }

      .footer-brand p {
        color: var(--text-secondary);
        font-size: 0.9375rem;
        line-height: 1.7;
      }

      .footer-column h4 {
        font-family: var(--font-display);
        font-size: 0.875rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-primary);
        margin-bottom: 20px;
      }

      .footer-links {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .footer-links a {
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.9375rem;
        transition: var(--transition-fast);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 0;
      }

      @media (hover: hover) and (pointer: fine) {
        .footer-links a:hover {
          color: var(--accent-gold);
        }
      }

      .footer-links a::before {
        content: "";
        width: 0;
        height: 1px;
        background: var(--accent-gold);
        transition: var(--transition-fast);
      }

      @media (hover: hover) and (pointer: fine) {
        .footer-links a:hover::before {
          width: 12px;
        }
      }

      .footer-links a:active {
        color: var(--text-primary);
      }

      /* Social Icons */
      .social-links {
        display: flex;
        gap: 12px;
        margin-top: 24px;
      }

      .social-link {
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-tertiary);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: var(--radius-md);
        color: var(--text-secondary);
        text-decoration: none;
        transition: var(--transition-medium);
        position: relative;
        overflow: hidden;
      }

      .social-link::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--accent-gradient);
        opacity: 0;
        transition: var(--transition-medium);
      }

      .social-link::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
        transform: skewX(-20deg);
        transition: left 0.5s ease;
        z-index: 2;
      }

      @media (hover: hover) and (pointer: fine) {
        .social-link:hover {
          transform: translateY(-4px);
          border-color: transparent;
          box-shadow: var(--accent-glow-gold);
          color: var(--text-primary);
        }

      @media (hover: hover) and (pointer: fine) {
        .social-link:hover::before {
          opacity: 1;
        }
      }

      @media (hover: hover) and (pointer: fine) {
        .social-link:hover::after {
          left: 150%;
        }
      }

      .social-link svg {
        position: relative;
        z-index: 3;
        width: 20px;
        height: 20px;
        fill: currentColor;
        transition: transform 0.3s ease;
      }

      @media (hover: hover) and (pointer: fine) {
        .social-link:hover svg {
          transform: scale(1.15);
        }
      }

      /* Footer Bottom */
      .footer-bottom {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 40px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }

      .footer-bottom p {
        color: var(--text-muted);
        font-size: 0.875rem;
      }

      /* ========================================
         NAVIGATION MENU (Desktop)
         ======================================== */
      .main-menu {
        display: flex;
        align-items: center;
      }

      .main-menu ul {
        display: flex;
        align-items: center;
        gap: 6px;
        list-style: none;
      }

      .nav-link {
        padding: 10px 14px;
        color: var(--text-secondary);
        text-decoration: none;
        font-family: var(--font-display);
        font-size: 0.875rem;
        font-weight: 500;
        border-radius: var(--radius-md);
        transition: color 200ms ease;
        white-space: nowrap;
        position: relative;
        overflow: hidden;
      }

      .nav-link::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          rgba(252, 175, 1, 0.15),
          rgba(252, 175, 1, 0.05)

        opacity: 0;
        transform: translateX(-100%);
        transition:
          opacity 250ms ease-out,
          transform 250ms ease-out;
        z-index: -1;
        border-radius: var(--radius-md);
      }

      .nav-link::after {
        content: "";
        position: absolute;
        bottom: 6px;
        left: 14px;
        right: 14px;
        height: 2px;
        background: var(--accent-gradient);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 250ms cubic-bezier(0.23, 1, 0.32, 1);
      }

      @media (hover: hover) and (pointer: fine) {
        .nav-link:hover,
        .nav-link.active {
          color: var(--accent-gold);
        }
      }

      @media (hover: hover) and (pointer: fine) {
        .nav-link:hover::before,
        .nav-link.active::before {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @media (hover: hover) and (pointer: fine) {
        .nav-link:hover::after,
        .nav-link.active::after {
          transform: scaleX(1);
        }
      }

      .mobile-only {
        display: none;
      }

      .nav-link-download {
        background: var(--bg-tertiary);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-primary);
        border-radius: var(--radius-md);
        padding: 12px 24px;
        margin-top: 8px;
        font-weight: 600;
        /* Stacking context: keeps the ::before gradient above the
           button's own background but below the label text */
        z-index: 0;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease,
          border-color 0.3s ease,
          color 0.3s ease;
      }

      /* Gradient fill + sheen sweep, same pattern as the store buttons */
      .nav-link-download::before {
        background: var(--accent-gradient);
        opacity: 0;
        transform: none;
        transition: opacity 0.3s ease;
      }

      .nav-link-download::after {
        top: 0;
        bottom: auto;
        left: -100%;
        right: auto;
        width: 50%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.25),
          transparent
        );
        transform: skewX(-20deg);
        transition: left 0.5s ease;
        z-index: 1;
      }

      @media (hover: hover) and (pointer: fine) {
        .nav-link-download:hover {
          color: #001a33;
          border-color: transparent;
          box-shadow: var(--accent-glow-gold);
          transform: translateY(-2px);
        }
      }

      @media (hover: hover) and (pointer: fine) {
        .nav-link-download:hover::before {
          opacity: 1;
          transform: none;
        }
      }

      @media (hover: hover) and (pointer: fine) {
        .nav-link-download:hover::after {
          left: 150%;
          transform: skewX(-20deg);
        }
      }

      /* Header CTA Button */
      .header-cta {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .header-download-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        background: var(--bg-tertiary);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        font-family: var(--font-display);
        font-size: 0.875rem;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease,
          border-color 0.3s ease,
          color 0.3s ease;
        white-space: nowrap;
        position: relative;
        overflow: hidden;
      }

      .header-download-btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--accent-gradient);
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .header-download-btn::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.25),
          transparent
        );
        transform: skewX(-20deg);
        transition: left 0.5s ease;
        z-index: 1;
      }

      @media (hover: hover) and (pointer: fine) {
        .header-download-btn:hover {
          transform: translateY(-2px);
          border-color: transparent;
          box-shadow: var(--accent-glow-gold);
          color: #001a33;
        }
      }

      @media (hover: hover) and (pointer: fine) {
        .header-download-btn:hover::before {
          opacity: 1;
        }
      }

      @media (hover: hover) and (pointer: fine) {
        .header-download-btn:hover::after {
          left: 150%;
        }
      }

      .header-download-btn svg,
      .header-download-btn span {
        position: relative;
        z-index: 2;
      }

      .header-download-btn svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
        transition: transform 0.3s ease;
      }

      @media (hover: hover) and (pointer: fine) {
        .header-download-btn:hover svg {
          transform: scale(1.15);
        }
      }

      /* ========================================
         RESPONSIVE STYLES
         ======================================== */
      @media (max-width: 1024px) {
        .footer-grid {
          grid-template-columns: repeat(3, 1fr);
          gap: 40px;
        }

        .footer-brand {
          grid-column: 1 / -1;
          max-width: 100%;
          text-align: center;
        }

        .social-links {
          justify-content: center;
        }
      }

      @media (max-width: 1160px) {
        .main-menu {
          display: block;
          position: absolute;
          top: 100%;
          left: 0;
          right: 0;
          z-index: 1001;
          background: var(--bg-secondary);
          padding: 20px;
          border-top: 1px solid rgba(255, 255, 255, 0.05);
          border-bottom-left-radius: var(--radius-xl);
          border-bottom-right-radius: var(--radius-xl);
          box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
          transform-origin: top center;

          opacity: 0;
          visibility: hidden;
          transform: translateY(-12px) scale(0.98);
          pointer-events: none;
          transition:
            opacity 250ms cubic-bezier(0.23, 1, 0.32, 1),
            transform 250ms cubic-bezier(0.23, 1, 0.32, 1),
            visibility 250ms cubic-bezier(0.23, 1, 0.32, 1);
        }

        .main-menu.active {
          opacity: 1;
          visibility: visible;
          transform: translateY(0) scale(1);
          pointer-events: auto;
        }

        @media (prefers-reduced-motion: reduce) {
          .main-menu {
            transition: none;
          }
        }

        .main-menu ul {
          flex-direction: column;
          gap: 8px;
        }

        .nav-link {
          display: block;
          text-align: center;
          padding: 14px 20px;
          font-size: 1.125rem;
        }

        .mobile-menu-toggle {
          display: flex;
        }

        .mobile-only {
          display: block;
        }

        .header-download-btn {
          display: none;
        }
      }

      @media (max-width: 768px) {
        .header-inner {
          flex-wrap: nowrap;
          padding: 0 16px;
          overflow: visible;
          gap: 8px;
        }

        .logo {
          gap: 8px;
          min-width: 0;

        .logo-text {
          min-width: 0;

          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .logo img {

          height: 40px;
        }

        .logo-text {
          font-size: 1.25rem;
        }

        .header-cta {
          gap: 6px;
          flex-shrink: 0;
          max-width: fit-content;
        }

        .lang-toggle {
          transform: scale(0.88);
        }

        .header-download-btn {
          padding: 8px 10px;
          font-size: 0.75rem;
          gap: 4px;
        }

        .header-download-btn svg {
          width: 16px;
          height: 16px;
        }

        .mobile-menu-toggle {
          padding: 6px;
          margin-left: 2px;
        }

        .footer-bottom {
          flex-direction: column;
          gap: 16px;
          text-align: center;
        }
      }

      @media (max-width: 640px) {
        .footer-grid {
          grid-template-columns: 1fr;
          gap: 40px;
        }

        .footer-brand {
          max-width: 100%;
          text-align: center;
        }

        .social-links {
          justify-content: center;
        }
      }

      @media (max-width: 480px) {
        .header-inner {
          padding: 0 10px;
        }

        .logo-text {
          font-size: 1rem;
        }

        .logo img {
          width: 34px;
          height: 34px;
        }

        .header-cta {
          gap: 3px;
        }

        .lang-toggle {
          transform: scale(0.82);
        }

        .mobile-menu-toggle {
          margin-left: 2px;
        }
      }

      /* ========================================
         ACCESSIBILITY & INTERACTION STATES
         ======================================== */

      /* Visible focus indicator for keyboard navigation */
      .header-download-btn:focus-visible,
      .nav-link:focus-visible,
      .lang-btn:focus-visible,
      .social-link:focus-visible,
      .footer-links a:focus-visible {
        outline: 2px solid var(--accent-gold);
        outline-offset: 3px;
      }

      /* Active/pressed feedback */
      .header-download-btn:active {
        transform: translateY(0) scale(0.97);
        filter: brightness(0.95);
      }

      .social-link:active {
        transform: translateY(-2px) scale(0.95);
      }

      /* ========================================
         MOBILE PERFORMANCE & INTERACTION GUARD
         ======================================== */
      @media (pointer: coarse), (max-width: 768px) {
        /* Reintroduce text shimmer on mobile, but slower to reduce paint cost */
        .logo-text {
          animation-duration: 8s;
        }

        .lang-btn:active {
          background: var(--accent-gradient);
          color: #001a33;
          box-shadow: 0 4px 15px rgba(252, 175, 1, 0.3);
          transform: translateY(-1px);
        }

        header {
          backdrop-filter: none !important;
        }
      }
    </style>
