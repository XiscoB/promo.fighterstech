    <!-- Download app modal -->
    <div class="download-modal" id="downloadModal" role="dialog" aria-modal="true" aria-labelledby="downloadTitle" hidden>
      <div class="download-modal__overlay"></div>
      <div class="download-modal__content">
        <h3 id="downloadTitle">{{nav.downloadTitle}}</h3>
        <p>{{nav.downloadDescription}}</p>
        <div class="download-modal__actions">
          <a href="{{hero.storeButtons.apple.url}}" class="download-modal__store download-modal__store--apple" target="_blank" rel="noopener noreferrer">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
            <span>{{nav.downloadAppStore}}</span>
          </a>
          <a href="{{hero.storeButtons.google.url}}" class="download-modal__store download-modal__store--google" target="_blank" rel="noopener noreferrer">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.9 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z"/>
            </svg>
            <span>{{nav.downloadGooglePlay}}</span>
          </a>
        </div>
        <button type="button" class="download-modal__cancel" id="downloadCancel">{{nav.downloadCancel}}</button>
      </div>
    </div>

    <style>
      .download-modal {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .download-modal[hidden] {
        display: none;
      }

      .download-modal__overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 10, 20, 0.85);
        backdrop-filter: blur(6px);
      }

      .download-modal__content {
        position: relative;
        background: var(--bg-secondary, #00284e);
        border: 1px solid rgba(252, 175, 1, 0.2);
        border-radius: var(--radius-lg, 20px);
        padding: 28px;
        max-width: 420px;
        width: 100%;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
        text-align: center;
      }

      .download-modal__content h3 {
        font-family: var(--font-display, "Chakra Petch", sans-serif);
        font-size: 1.35rem;
        margin-bottom: 8px;
        color: var(--text-primary, #ffffff);
      }

      .download-modal__content > p {
        color: var(--text-secondary, rgba(255, 255, 255, 0.8));
        margin-bottom: 24px;
      }

      .download-modal__actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      .download-modal__store {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        flex: 1 1 140px;
        min-width: 140px;
        padding: 14px 20px;
        border-radius: var(--radius-md, 12px);
        font-family: var(--font-display, "Chakra Petch", sans-serif);
        font-weight: 600;
        text-decoration: none;
        color: #000000;
        transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      }

      .download-modal__store--apple {
        background: #ffffff;
      }

      .download-modal__store--google {
        background: linear-gradient(135deg, var(--accent-gold, #fcaf01) 0%, var(--accent-blue, #1e90ff) 100%);
      }

      .download-modal__store:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(252, 175, 1, 0.25);
        filter: brightness(1.05);
      }

      .download-modal__cancel {
        background: transparent;
        color: var(--text-secondary, rgba(255, 255, 255, 0.8));
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: var(--radius-md, 12px);
        padding: 10px 20px;
        font-family: var(--font-display, "Chakra Petch", sans-serif);
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      }

      .download-modal__cancel:hover {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text-primary, #ffffff);
        border-color: rgba(255, 255, 255, 0.4);
      }

      @media (max-width: 480px) {
        .download-modal__actions {
          flex-direction: column;
        }

        .download-modal__store {
          width: 100%;
        }
      }
    </style>

    <script>
      (function () {
        const modal = document.getElementById("downloadModal");
        if (!modal) return;

        const cancel = document.getElementById("downloadCancel");
        const overlay = modal.querySelector(".download-modal__overlay");

        function openModal() {
          modal.removeAttribute("hidden");
          document.body.style.overflow = "hidden";
        }

        function closeModal() {
          modal.setAttribute("hidden", "");
          document.body.style.overflow = "";
        }

        document.querySelectorAll(".download-modal-trigger").forEach(function (trigger) {
          trigger.addEventListener("click", function (e) {
            e.preventDefault();
            openModal();
          });
        });

        if (cancel) cancel.addEventListener("click", closeModal);
        if (overlay) overlay.addEventListener("click", closeModal);

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && !modal.hasAttribute("hidden")) {
            closeModal();
          }
        });
      })();
    </script>
