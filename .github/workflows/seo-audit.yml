# ============================================================
# FightersTech SEO Audit & Validation Workflow
# Runs on every push to main and weekly on schedule
# ============================================================

name: SEO Audit & Validation

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.html'
      - '**.txt'
      - '**.xml'
      - '**.json'
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  # ============================================================
  # JOB 1: Validate robots.txt and sitemap.xml
  # ============================================================
  validate-seo-files:
    name: Validate SEO Configuration Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate robots.txt syntax
        run: |
          echo "=== Validating robots.txt ==="
          if [ -f "robots.txt" ]; then
            echo "✓ robots.txt exists"
            # Check for required elements
            if grep -q "Sitemap:" robots.txt; then
              echo "✓ Sitemap reference found"
            else
              echo "✗ Missing Sitemap reference"
              exit 1
            fi
            if grep -q "User-agent:" robots.txt; then
              echo "✓ User-agent directives found"
            fi
            # Check for AI crawlers
            if grep -q "GPTBot" robots.txt; then
              echo "✓ GPTBot directive found"
            fi
            if grep -q "ClaudeBot" robots.txt; then
              echo "✓ ClaudeBot directive found"
            fi
          else
            echo "✗ robots.txt missing"
            exit 1
          fi

      - name: Validate sitemap.xml
        run: |
          echo "=== Validating sitemap.xml ==="
          if [ -f "sitemap.xml" ]; then
            echo "✓ sitemap.xml exists"
            # Basic XML validation
            if xmllint --noout sitemap.xml 2>/dev/null; then
              echo "✓ XML is well-formed"
            else
              echo "✗ XML parsing error"
              exit 1
            fi
            # Check for required elements
            if grep -q "<urlset" sitemap.xml; then
              echo "✓ URLSet element found"
            fi
            if grep -q "<loc>https://promo.fighterstech.com" sitemap.xml; then
              echo "✓ Correct domain in URLs"
            fi
          else
            echo "✗ sitemap.xml missing"
            exit 1
          fi

      - name: Validate llms.txt
        run: |
          echo "=== Validating llms.txt ==="
          if [ -f "llms.txt" ]; then
            echo "✓ llms.txt exists"
            if grep -q "Training Use:" llms.txt; then
              echo "✓ Training policy defined"
            fi
            if grep -q "CITATION REQUIREMENTS" llms.txt; then
              echo "✓ Citation requirements present"
            fi
          else
            echo "⚠ llms.txt missing (optional but recommended)"
          fi

  # ============================================================
  # JOB 2: Lighthouse CI Performance & SEO Audit
  # ============================================================
  lighthouse-audit:
    name: Lighthouse CI Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        run: |
          # Start a simple HTTP server
          npx serve . -l 3000 &
          SERVER_PID=$!
          sleep 2
          
          # Run Lighthouse CI
          lhci autorun --config=lighthouserc.json || true
          
          kill $SERVER_PID || true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        continue-on-error: true

  # ============================================================
  # JOB 3: Check for broken links
  # ============================================================
  link-check:
    name: Broken Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check internal links
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            --verbose
            --no-progress
            --timeout 30
            --retry 3
            --exclude-path node_modules
            --exclude-all-private
            .
          fail: false

  # ============================================================
  # JOB 4: HTML Validation
  # ============================================================
  html-validate:
    name: HTML Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate HTML files
        run: |
          echo "=== Validating HTML files ==="
          for file in $(find . -name "*.html" -not -path "./node_modules/*"); do
            echo "Checking: $file"
            html-validate "$file" || true
          done
        continue-on-error: true

  # ============================================================
  # JOB 5: Notify on issues
  # ============================================================
  notify-results:
    name: Report Results
    runs-on: ubuntu-latest
    needs: [validate-seo-files, lighthouse-audit, link-check, html-validate]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## SEO Audit Complete 🔍" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| SEO Files | ${{ needs.validate-seo-files.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lighthouse | ${{ needs.lighthouse-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Link Check | ${{ needs.link-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| HTML Validate | ${{ needs.html-validate.result }} |" >> $GITHUB_STEP_SUMMARY
